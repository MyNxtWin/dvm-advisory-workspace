[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com; connect-src 'self' https://api.anthropic.com https://api.sendgrid.com https://*.netlify.com; style-src 'self' 'unsafe-inline';"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
